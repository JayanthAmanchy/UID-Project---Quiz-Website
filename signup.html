<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>

    <div class="login-box">
        <h1>Sign Up</h1>

        <div id="signup">
            <form onsubmit="showMessage(event)">

                <div class="input-box">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" required placeholder="first name">
                </div>

                <div class="input-box">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" required placeholder="last name">
                </div>

                <div class="input-box">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="example@gmail.com">
                </div>

                <div class="input-box">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="password">
                </div>
                <div class="input-box">
                    <input type="submit" value="Sign Up">
                </div>

            </form>
        </div>
    </div>

    <script src="signup.js"></script>

</body>
</html>
